

# Development overrides — extends docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

# Bring up the core shared services first
#docker compose up -d mysql-shared redis nginx-gateway

# Boot up the backend microservices
#docker compose up -d idp core business

# Particular apps
#docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d account website admin superadmin

# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d


services:
  account:
    build:
      context: ./apps/frontend/account
      target: deps
    command: npm run dev
    volumes:
      - ./apps/frontend/account:/app
      - /app/node_modules # Anonymous mapping ensures local system files remain untouched
      - /app/.next
    environment:
      - NODE_ENV=development

  admin:
