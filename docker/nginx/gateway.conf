server {
    listen 80;
    server_name localhost;
    charset utf-8;
    client_max_body_size 100M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 1. Identity Engine Routing Layer
    location /api/v1/idp {
        alias /var/www/html/idp/public;
        try_files $uri $uri/ @idp_backend;

        location ~ \.php$ {
            fastcgi_pass idp:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # 2. Core Administration Modules Router
    location /api/v1/core {
        alias /var/www/html/core/public;
        try_files $uri $uri/ @core_backend;

        location ~ \.php$ {
            fastcgi_pass core:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # 3. Heavy Business Logic Router (CRM, Ecommerce, Drive)
    location /api/v1/business {
        alias /var/www/html/business/public;
        try_files $uri $uri/ @business_backend;

        location ~ \.php$ {
            fastcgi_pass business:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # Fallback Named Locations to pass clean URL structures straight to Laravel
    location @idp_backend {
        rewrite ^/api/v1/idp/(.*)$ /index.php?$query_string;
        fastcgi_pass idp:9000;
    }

    location @core_backend {
        rewrite ^/api/v1/core/(.*)$ /index.php?$query_string;
        fastcgi_pass core:9000;
    }

    location @business_backend {
        rewrite ^/api/v1/business/(.*)$ /index.php?$query_string;
        fastcgi_pass business:9000;
    }
}